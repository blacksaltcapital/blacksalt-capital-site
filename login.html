<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Login</title>
  <meta name="description" content="Secure investor portal." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* transition styling overrides — visual only, no functional changes */
    * { font-family: "Times New Roman", Times, serif !important; }
    html, body { background: #ffffff !important; color: #000000 !important; }
    header, footer, main, section, div, nav { background: transparent !important; color: #000000 !important; }
    h1, h2, h3, p, span, label, a, small { color: #000000 !important; }
    a { text-decoration: underline; }
    input, select, textarea { background: #ffffff !important; color: #000000 !important; border: 1px solid #000000 !important; }
    button, .btn, input[type="submit"] { background: #ffffff !important; color: #000000 !important; border: 1px solid #000000 !important; }
    ::placeholder { color: #555555 !important; }
    .auth-card { background: #ffffff !important; border: 1px solid #000000 !important; box-shadow: none !important; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>


</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Home">Investor Portal</a>
      <div class="header-actions">
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="/">Back to Site</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-card">

        <!-- LOGIN FORM -->
        <div id="login-form-wrap" class="login-form-wrap">
          <h1>Investor Portal</h1>
          <p class="subtitle">Sign in to access your statements and documents.</p>

          <form id="login-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <div class="form-group">
              <div class="password-row">
                <label for="password">Password</label>
                <a href="#" class="forgot-link" id="show-forgot">Forgot password?</a>
              </div>
              <div class="input-wrap">
                <input type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
                <button type="button" class="pw-toggle" aria-label="Show password" data-target="password">Show</button>
              </div>
            </div>
            <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
          </form>

          <div class="auth-error" id="login-error" role="alert"></div>
        </div>

        <!-- FORGOT PASSWORD FORM -->
        <div id="forgot-form-wrap" class="forgot-form">
          <h1>Reset Password</h1>
          <p class="subtitle">Enter your email and we'll send you a reset link.</p>

          <form id="forgot-form">
            <div class="form-group">
              <label for="forgot-email">Email</label>
              <input type="email" id="forgot-email" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <button type="submit" class="auth-btn" id="forgot-btn">Send Reset Link</button>
          </form>

          <div class="auth-error" id="forgot-error" role="alert"></div>
          <div class="auth-success" id="forgot-success" role="status"></div>

          <div class="auth-footer" style="margin-top: 1.25rem;">
            <a href="#" id="show-login">← Back to sign in</a>
          </div>
        </div>

        <div class="auth-footer">
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> All rights reserved.</p>
      <a href="/">Back to site</a>
    </div>
  </footer>

  <script src="login.js"></script>
</body>
</html>
