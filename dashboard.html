<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Dashboard - BlackSalt Capital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #2a3f5f;
            padding-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .section-subtitle {
            color: #a0a0a0;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .documents-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .document-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: #1a2845;
            border: 1px solid #2a3f5f;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .document-item:hover {
            background: #243456;
            border-color: #3a5f8f;
        }

        .document-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .document-icon {
            width: 40px;
            height: 40px;
            background: #2a3f5f;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6db3f2;
            font-size: 1.2rem;
        }

        .document-details {
            flex: 1;
        }

        .document-name {
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .document-date {
            font-size: 0.85rem;
            color: #7a8a9a;
        }

        .download-btn {
            padding: 8px 16px;
            background: #6db3f2;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .download-btn:hover {
            background: #5a9fd4;
        }

        .subfolder-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #b0c0d0;
            margin: 30px 0 15px 0;
            padding-top: 20px;
            border-top: 1px solid #2a3f5f;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #7a8a9a;
            background: #1a2845;
            border: 1px dashed #2a3f5f;
            border-radius: 6px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .document-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .download-btn {
                align-self: flex-start;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Investor Dashboard</h1>
            <p id="userEmail">Signed in as...</p>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>

        <div id="content">
            <div class="loading">Loading your documents...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';

        const SUPABASE_URL = 'https://hqhomownlrjczlxalkpc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n-pqJPmUR04xTkI1-TC-rw_9LIFslUm';

        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check if user is logged in
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return null;
            }
            return session;
        }

        // Format file date
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // Get all files and organize by folder structure
        async function loadDocuments(session) {
            const userEmail = session.user.email;
            const userId = session.user.id;

            document.getElementById('userEmail').textContent = `Signed in as ${userEmail}`;

            let html = '';

            // SHARED DOCUMENTS (visible to all)
            try {
                const { data: sharedFiles, error: sharedError } = await sb.storage
                    .from('statements')
                    .list('shared', {
                        limit: 1000,
                        offset: 0,
                        sortBy: { column: 'name', order: 'asc' }
                    });

                if (!sharedError && sharedFiles && sharedFiles.length > 0) {
                    html += `
                        <div class="section">
                            <h2 class="section-title">Quarterly Letters & Updates</h2>
                            <p class="section-subtitle">Available to all partners</p>
                            <div class="documents-grid">
                    `;

                    // Separate files and folders
                    const folders = sharedFiles.filter(f => f.id === null);
                    const files = sharedFiles.filter(f => f.id !== null && f.name);

                    // Add direct files first (if any)
                    for (const file of files) {
                        const { data: urlData } = await sb.storage
                            .from('statements')
                            .createSignedUrl(`shared/${file.name}`, 3600);
                        const url = urlData?.signedUrl || '#';

                        html += `
                            <div class="document-item">
                                <div class="document-info">
                                    <div class="document-icon">📄</div>
                                    <div class="document-details">
                                        <div class="document-name">${file.name}</div>
                                        <div class="document-date">${formatDate(file.updated_at)}</div>
                                    </div>
                                </div>
                                <a href="${url}" download class="download-btn">Download</a>
                            </div>
                        `;
                    }

                    // Add files from each subfolder
                    for (const folder of folders) {
                        const { data: folderFiles, error: folderError } = await sb.storage
                            .from('statements')
                            .list(`shared/${folder.name}`, {
                                limit: 1000,
                                offset: 0,
                                sortBy: { column: 'name', order: 'asc' }
                            });

                        if (!folderError && folderFiles && folderFiles.length > 0) {
                            html += `<div class="subfolder-title">${folder.name}</div>`;

                            for (const file of folderFiles) {
                                if (file.id !== null && file.name) {
                                    const { data: urlData } = await sb.storage
                                        .from('statements')
                                        .createSignedUrl(`shared/${folder.name}/${file.name}`, 3600);
                                    const url = urlData?.signedUrl || '#';

                                    html += `
                                        <div class="document-item">
                                            <div class="document-info">
                                                <div class="document-icon">📄</div>
                                                <div class="document-details">
                                                    <div class="document-name">${file.name}</div>
                                                    <div class="document-date">${formatDate(file.updated_at)}</div>
                                                </div>
                                            </div>
                                            <a href="${url}" download class="download-btn">Download</a>
                                        </div>
                                    `;
                                }
                            }
                        }
                    }

                    html += `
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Error loading shared documents:', err);
            }

            // PERSONAL DOCUMENTS (only visible to that investor)
            try {
                const { data: personalFiles, error: personalError } = await sb.storage
                    .from('statements')
                    .list(userId, {
                        limit: 1000,
                        offset: 0,
                        sortBy: { column: 'name', order: 'asc' }
                    });

                if (!personalError && personalFiles && personalFiles.length > 0) {
                    html += `
                        <div class="section">
                            <h2 class="section-title">Your Personal Documents</h2>
                            <p class="section-subtitle">K-1s, unit ownership, and personal statements</p>
                            <div class="documents-grid">
                    `;

                    // Separate files and folders
                    const folders = personalFiles.filter(f => f.id === null);
                    const files = personalFiles.filter(f => f.id !== null && f.name);

                    // Add direct files first (if any)
                    for (const file of files) {
                        const { data: urlData } = await sb.storage
                            .from('statements')
                            .createSignedUrl(`${userId}/${file.name}`, 3600);
                        const url = urlData?.signedUrl || '#';

                        html += `
                            <div class="document-item">
                                <div class="document-info">
                                    <div class="document-icon">🔐</div>
                                    <div class="document-details">
                                        <div class="document-name">${file.name}</div>
                                        <div class="document-date">${formatDate(file.updated_at)}</div>
                                    </div>
                                </div>
                                <a href="${url}" download class="download-btn">Download</a>
                            </div>
                        `;
                    }

                    // Add files from each subfolder (like K-1s, Unit Ownership, etc)
                    for (const folder of folders) {
                        const { data: folderFiles, error: folderError } = await sb.storage
                            .from('statements')
                            .list(`${userId}/${folder.name}`, {
                                limit: 1000,
                                offset: 0,
                                sortBy: { column: 'name', order: 'asc' }
                            });

                        if (!folderError && folderFiles && folderFiles.length > 0) {
                            html += `<div class="subfolder-title">${folder.name}</div>`;

                            for (const file of folderFiles) {
                                if (file.id !== null && file.name) {
                                    const { data: urlData } = await sb.storage
                                        .from('statements')
                                        .createSignedUrl(`${userId}/${folder.name}/${file.name}`, 3600);
                                    const url = urlData?.signedUrl || '#';

                                    html += `
                                        <div class="document-item">
                                            <div class="document-info">
                                                <div class="document-icon">🔐</div>
                                                <div class="document-details">
                                                    <div class="document-name">${file.name}</div>
                                                    <div class="document-date">${formatDate(file.updated_at)}</div>
                                                </div>
                                            </div>
                                            <a href="${url}" download class="download-btn">Download</a>
                                        </div>
                                    `;
                                }
                            }
                        }
                    }

                    html += `
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="section">
                            <h2 class="section-title">Your Personal Documents</h2>
                            <p class="section-subtitle">K-1s, unit ownership, and personal statements</p>
                            <div class="empty-state">No personal documents available yet</div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Error loading personal documents:', err);
            }

            document.getElementById('content').innerHTML = html;
        }

        // Logout handler
        window.handleLogout = async function() {
            await sb.auth.signOut();
            window.location.href = 'login.html';
        };

        // Initialize
        const session = await checkSession();
        if (session) {
            await loadDocuments(session);
        }
    </script>
</body>
</html>
