<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Dashboard</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>


</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Home">Investor Portal</a>
      <div class="header-actions">
        <nav id="site-nav" class="site-nav" aria-label="Dashboard navigation">
          <a href="/">Home</a>
        </nav>
        <button class="logout-btn" id="logout-btn">Sign Out</button>
      </div>
    </div>
  </header>

  <main>
    <section class="dashboard-page">
      <div class="container">

        <div class="dash-header">
          <div>
            <h1>Investor Dashboard</h1>
            <p class="dash-welcome" id="welcome-text">Loading…</p>
          </div>
        </div>

        <div class="info-cards" id="info-cards">
          <div class="info-card">
            <span class="card-label">Account</span>
            <div class="card-value skeleton" id="card-name"></div>
          </div>
          <div class="info-card">
            <span class="card-label">Member Since</span>
            <div class="card-value skeleton" id="card-since"></div>
          </div>
          <div class="info-card">
            <span class="card-label">Units Owned</span>
            <div class="card-value skeleton" id="card-units"></div>
          </div>
        </div>

        <!-- SHARED DOCUMENTS -->
        <div class="doc-section" id="shared-section">
          <div class="doc-section-header">
            <div>
              <h2 class="section-title">Letters & Quarterly Reports</h2>
              <p class="section-subtitle">Available to all partners</p>
            </div>
            <div class="doc-search-wrap" id="shared-search-wrap" style="display:none;">
              <input type="search" class="doc-search" id="shared-search" placeholder="Filter documents…" aria-label="Filter shared documents" />
            </div>
          </div>
          <div id="shared-doc-list">
            <div class="doc-list" id="shared-loading">
              <div class="doc-row doc-row--skeleton"><div class="doc-info"><div class="doc-icon skel-icon"></div><div class="doc-skel-text"><div class="skeleton skel-line skel-line--lg"></div><div class="skeleton skel-line skel-line--sm"></div></div></div><div class="skeleton skel-btn"></div></div>
              <div class="doc-row doc-row--skeleton"><div class="doc-info"><div class="doc-icon skel-icon"></div><div class="doc-skel-text"><div class="skeleton skel-line skel-line--lg"></div><div class="skeleton skel-line skel-line--sm"></div></div></div><div class="skeleton skel-btn"></div></div>
              <div class="doc-row doc-row--skeleton"><div class="doc-info"><div class="doc-icon skel-icon"></div><div class="doc-skel-text"><div class="skeleton skel-line skel-line--lg"></div><div class="skeleton skel-line skel-line--sm"></div></div></div><div class="skeleton skel-btn"></div></div>
            </div>
          </div>
        </div>

        <hr class="section-divider" />

        <!-- PRIVATE DOCUMENTS -->
        <div class="doc-section" id="private-section">
          <div class="doc-section-header">
            <div>
              <h2 class="section-title">Your Personal Documents</h2>
              <p class="section-subtitle">K-1s, unit ownership, and personal statements</p>
            </div>
            <div class="doc-search-wrap" id="private-search-wrap" style="display:none;">
              <input type="search" class="doc-search" id="private-search" placeholder="Filter documents…" aria-label="Filter personal documents" />
            </div>
          </div>
          <div id="private-doc-list">
            <div class="doc-list" id="private-loading">
              <div class="doc-row doc-row--skeleton"><div class="doc-info"><div class="doc-icon skel-icon"></div><div class="doc-skel-text"><div class="skeleton skel-line skel-line--lg"></div><div class="skeleton skel-line skel-line--sm"></div></div></div><div class="skeleton skel-btn"></div></div>
              <div class="doc-row doc-row--skeleton"><div class="doc-info"><div class="doc-icon skel-icon"></div><div class="doc-skel-text"><div class="skeleton skel-line skel-line--lg"></div><div class="skeleton skel-line skel-line--sm"></div></div></div><div class="skeleton skel-btn"></div></div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> All rights reserved.</p>
      <a href="#top">Back to top</a>
    </div>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
