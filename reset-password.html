<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — BlackSalt Capital L.P.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .reset-page {
      min-height: calc(100vh - 5.75rem);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 0;
    }

    .reset-card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem 2rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: var(--panel);
    }

    .reset-card h1 {
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin: 0 0 0.5rem;
      max-width: 100%;
    }

    .reset-card .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input::placeholder {
      color: rgba(166, 175, 187, 0.5);
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .reset-btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: var(--bg);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
      margin-top: 0.5rem;
    }

    .reset-btn:hover {
      opacity: 0.88;
    }

    .reset-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .reset-error {
      margin-top: 1rem;
      padding: 0.7rem 0.9rem;
      border-radius: 0.5rem;
      background: rgba(220, 80, 80, 0.12);
      border: 1px solid rgba(220, 80, 80, 0.25);
      color: #e87171;
      font-size: 0.85rem;
      display: none;
    }

    .reset-success {
      margin-top: 1rem;
      padding: 0.7rem 0.9rem;
      border-radius: 0.5rem;
      background: rgba(80, 180, 80, 0.12);
      border: 1px solid rgba(80, 180, 80, 0.25);
      color: #6fcf6f;
      font-size: 0.85rem;
      display: none;
    }

    .reset-footer {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .reset-footer a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="BlackSalt Capital home">BlackSalt Capital L.P.</a>
      <div class="header-actions">
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Back to Site</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="reset-page">
      <div class="reset-card">
        <h1>Set New Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <form id="reset-form">
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" placeholder="Enter new password" required minlength="6" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="reset-btn" id="reset-btn">Update Password</button>
        </form>

        <div class="reset-error" id="reset-error"></div>
        <div class="reset-success" id="reset-success"></div>

        <div class="reset-footer">
          <a href="login.html">← Back to sign in</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> BlackSalt Capital L.P. All rights reserved.</p>
      <a href="index.html">Back to site</a>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://hqhomownlrjczlxalkpc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_n-pqJPmUR04xTkI1-TC-rw_9LIFslUm';  // <-- Paste your publishable key

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    const resetForm = document.getElementById('reset-form');
    const resetBtn = document.getElementById('reset-btn');
    const resetError = document.getElementById('reset-error');
    const resetSuccess = document.getElementById('reset-success');

    // Supabase automatically picks up the recovery token from the URL hash
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        console.log('Password recovery mode active');
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating…';
      resetError.style.display = 'none';
      resetSuccess.style.display = 'none';

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        resetError.textContent = 'Passwords do not match.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      if (newPassword.length < 6) {
        resetError.textContent = 'Password must be at least 6 characters.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      const { data, error } = await sb.auth.updateUser({
        password: newPassword,
      });

      if (error) {
        resetError.textContent = 'Unable to update password. The reset link may have expired. Please request a new one.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      } else {
        resetSuccess.textContent = 'Password updated successfully! Redirecting to login…';
        resetSuccess.style.display = 'block';
        resetForm.style.display = 'none';

        setTimeout(async () => {
          await sb.auth.signOut();
          window.location.href = 'login.html';
        }, 2000);
      }
    });
  </script>
</body>
</html>
