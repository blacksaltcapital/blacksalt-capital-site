<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — BlackSalt Capital L.P.</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>


</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="BlackSalt Capital home">BlackSalt Capital L.P.</a>
      <div class="header-actions">
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="/">Back to Site</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-card">
        <h1>Set New Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <form id="reset-form">
          <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="input-wrap">
              <input type="password" id="new-password" placeholder="Enter new password" required minlength="6" autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Show password" data-target="new-password">Show</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="6" autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Show password" data-target="confirm-password">Show</button>
            </div>
          </div>
          <button type="submit" class="auth-btn" id="reset-btn">Update Password</button>
        </form>

        <div class="auth-error" id="reset-error" role="alert"></div>
        <div class="auth-success" id="reset-success" role="status"></div>

        <div class="auth-footer">
          <a href="/login">← Back to sign in</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> BlackSalt Capital L.P. All rights reserved.</p>
      <a href="/">Back to site</a>
    </div>
  </footer>

  <script src="reset-password.js"></script>
</body>
</html>
