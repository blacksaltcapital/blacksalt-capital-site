<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — BlackSalt Capital L.P.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>


</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="BlackSalt Capital home">BlackSalt Capital L.P.</a>
      <div class="header-actions">
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Back to Site</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-card">
        <h1>Set New Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <form id="reset-form">
          <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="input-wrap">
              <input type="password" id="new-password" placeholder="Enter new password" required minlength="6" autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Show password" data-target="new-password">Show</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="6" autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Show password" data-target="confirm-password">Show</button>
            </div>
          </div>
          <button type="submit" class="auth-btn" id="reset-btn">Update Password</button>
        </form>

        <div class="auth-error" id="reset-error"></div>
        <div class="auth-success" id="reset-success"></div>

        <div class="auth-footer">
          <a href="login.html">← Back to sign in</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> BlackSalt Capital L.P. All rights reserved.</p>
      <a href="index.html">Back to site</a>
    </div>
  </footer>

  <script>
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    const resetForm = document.getElementById('reset-form');
    const resetBtn = document.getElementById('reset-btn');
    const resetError = document.getElementById('reset-error');
    const resetSuccess = document.getElementById('reset-success');

    // Password visibility toggles
    document.querySelectorAll('.pw-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? 'Hide' : 'Show';
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });
    });

    // Supabase automatically picks up the recovery token from the URL hash
    sb.auth.onAuthStateChange(async (event, session) => {
      // PASSWORD_RECOVERY event signals the token is valid and the form is active
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating…';
      resetError.style.display = 'none';
      resetSuccess.style.display = 'none';

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        resetError.textContent = 'Passwords do not match.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      if (newPassword.length < 6) {
        resetError.textContent = 'Password must be at least 6 characters.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      const { data, error } = await sb.auth.updateUser({
        password: newPassword,
      });

      if (error) {
        resetError.textContent = 'Unable to update password. The reset link may have expired. Please request a new one.';
        resetError.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      } else {
        resetSuccess.textContent = 'Password updated successfully! Redirecting to login…';
        resetSuccess.style.display = 'block';
        resetForm.style.display = 'none';

        setTimeout(async () => {
          await sb.auth.signOut();
          window.location.href = 'login.html';
        }, 2000);
      }
    });
  </script>
</body>
</html>
